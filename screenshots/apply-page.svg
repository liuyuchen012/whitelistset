<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="白名单申请页面截图示意图">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="800" height="480" fill="url(#pageBg)" rx="24"/>
  <circle cx="660" cy="90" r="80" fill="#e94560" opacity="0.16" filter="url(#blur)"/>
  <circle cx="140" cy="120" r="70" fill="#ffffff" opacity="0.08" filter="url(#blur)"/>
  <rect x="120" y="70" width="560" height="340" rx="26" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <text x="170" y="128" fill="#f8fafc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700">服务器白名单申请</text>
  <text x="170" y="162" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="14">填写信息申请加入服务器白名单</text>

  <rect x="170" y="190" width="460" height="50" rx="14" fill="rgba(255,255,255,0.06)" stroke="#334155" stroke-width="1"/>
  <text x="186" y="220" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="13">玩家ID *</text>
  <rect x="170" y="210" width="460" height="20" rx="10" fill="#111827"/>

  <rect x="170" y="258" width="460" height="50" rx="14" fill="rgba(255,255,255,0.06)" stroke="#334155" stroke-width="1"/>
  <text x="186" y="288" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="13">QQ号 *</text>
  <rect x="170" y="278" width="460" height="20" rx="10" fill="#111827"/>

  <rect x="170" y="326" width="460" height="50" rx="14" fill="rgba(255,255,255,0.06)" stroke="#334155" stroke-width="1"/>
  <text x="186" y="356" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="13">邮箱 *</text>
  <rect x="170" y="346" width="460" height="20" rx="10" fill="#111827"/>

  <rect x="170" y="394" width="460" height="50" rx="14" fill="rgba(255,255,255,0.06)" stroke="#334155" stroke-width="1"/>
  <text x="186" y="424" fill="#cbd5e1" font-family="Segoe UI, sans-serif" font-size="13">账号类型 *</text>
  <rect x="170" y="408" width="176" height="24" rx="12" fill="#111827"/>
  <rect x="360" y="408" width="176" height="24" rx="12" fill="#111827"/>
  <text x="186" y="425" fill="#f8fafc" font-family="Segoe UI, sans-serif" font-size="12">正版账号</text>
  <text x="376" y="425" fill="#f8fafc" font-family="Segoe UI, sans-serif" font-size="12">离线账号</text>

  <rect x="170" y="458" width="180" height="42" rx="14" fill="#e94560"/>
  <text x="208" y="488" fill="#fff" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700">提交申请</text>
</svg>